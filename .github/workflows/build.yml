name: Build Clash Blacklist

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build blacklist
        run: python build.py

      - name: Commit output
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add output/

          git diff --cached --quiet || (
            git commit -m "Update blacklist"
            git push
          )
